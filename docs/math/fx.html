<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galli, Santin — f(x) XR</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body, html {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #04080f;
        color: #c8dff8;
        font-family: 'JetBrains Mono', monospace;
      }

      /* ══════════════════════════════════════════
         PANEL
      ══════════════════════════════════════════ */
      #panel {
        position: absolute;
        left: 1.1rem; top: 1.1rem;
        width: 320px;
        z-index: 10;
        border-radius: 16px;
        overflow: hidden;
        background:
          linear-gradient(135deg, rgba(40,120,220,0.08) 0%, rgba(10,30,70,0.0) 60%),
          rgba(5, 11, 26, 0.9);
        border: 1px solid rgba(80, 180, 255, 0.18);
        backdrop-filter: blur(24px) saturate(1.6);
        box-shadow:
          0 0 0 1px rgba(120,210,255,0.06) inset,
          0 8px 40px rgba(0,0,0,0.7),
          0 0 60px rgba(60,160,255,0.06);
      }

      #panel::before {
        content: '';
        display: block;
        height: 2px;
        background: linear-gradient(90deg, transparent 0%, #3af 18%, #7af 40%, #f6a 65%, #fd6 85%, transparent 100%);
        opacity: 0.7;
      }

      .panel-inner { padding: 0.9rem 1rem 1rem; }

      .ph { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
      .ph-left { display: flex; flex-direction: column; gap: 0.05rem; }
      .ph-title {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700; font-size: 0.88rem;
        color: #7dd6ff; letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .ph-sub { font-size: 0.62rem; color: rgba(140,190,240,0.45); letter-spacing: 0.06em; }
      
      .live-dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: #3f6; box-shadow: 0 0 6px #3f6;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,100% { opacity: 1; transform: scale(1); }
        50%      { opacity: 0.5; transform: scale(0.75); }
      }

      .sec-label {
        font-size: 0.58rem; letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(100,160,220,0.45);
        margin-bottom: 0.42rem; margin-top: 0.72rem;
      }

      .fx-row { display: flex; align-items: center; gap: 0.38rem; }
      .fx-lbl { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.78rem; color: #fad85a; flex-shrink: 0; }
      #fxInput {
        flex: 1; min-width: 0;
        background: rgba(50,120,220,0.08);
        border: 1px solid rgba(80,160,255,0.22);
        border-radius: 8px; padding: 0.32rem 0.55rem;
        font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
        color: #e8f4ff; outline: none;
        caret-color: #7dd6ff;
      }
      #fxInput:focus { border-color: rgba(100,200,255,0.5); box-shadow: 0 0 0 3px rgba(80,180,255,0.1); }
      
      #applyBtn {
        flex-shrink: 0; background: linear-gradient(135deg, #3af 0%, #29e 100%); color: #02060f;
        border: none; border-radius: 8px; padding: 0.32rem 0.6rem;
        font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.68rem;
        cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase;
        box-shadow: 0 2px 10px rgba(60,170,255,0.3); transition: transform .1s;
      }
      #applyBtn:hover { opacity: 0.88; box-shadow: 0 2px 14px rgba(60,170,255,0.5); }
      #applyBtn:active { transform: scale(0.94); }

      #fxError { font-size: 0.66rem; color: #ff7aac; min-height: 0.85rem; margin-top: 0.28rem; }

      /* Sliders */
      .sr { display: grid; grid-template-columns: 22px 1fr 46px; gap: 0.4rem; align-items: center; margin-bottom: 0.48rem; }
      .sn { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.76rem; text-align: center; }
      .sn.a  { color: #5ae4ff; text-shadow: 0 0 8px rgba(90,228,255,0.6); }
      .sn.b  { color: #ff7aac; text-shadow: 0 0 8px rgba(255,122,172,0.6); }
      .sv { font-size: 0.7rem; text-align: right; color: rgba(180,220,255,0.5); font-variant-numeric: tabular-nums; }

      input[type='range'] {
        -webkit-appearance: none; appearance: none;
        width: 100%; height: 3px; border-radius: 2px;
        background: rgba(30,70,140,0.6); outline: none; cursor: pointer;
      }

      #aSlider { background: linear-gradient(90deg, rgba(90,228,255,0.35) var(--pct,50%), rgba(30,70,140,0.5) var(--pct,50%)); }
      #bSlider { background: linear-gradient(90deg, rgba(255,122,172,0.35) var(--pct,50%), rgba(30,70,140,0.5) var(--pct,50%)); }

      input[type='range']::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; cursor:pointer; }
      #aSlider::-webkit-slider-thumb { background:#5ae4ff; box-shadow:0 0 6px rgba(90,228,255,0.7); }
      #bSlider::-webkit-slider-thumb { background:#ff7aac; box-shadow:0 0 6px rgba(255,122,172,0.7); }

      .div { height: 1px; background: linear-gradient(90deg, transparent, rgba(80,160,255,0.15), transparent); margin: 0.65rem 0; }
      .hint { font-size: 0.62rem; color: rgba(140,180,230,0.32); line-height: 1.65; margin-top: 0.6rem; }
      .hint b { color: rgba(120,210,255,0.55); font-weight: 500; }

      .examples { display: flex; flex-wrap: wrap; gap: 0.28rem; margin-top: 0.5rem; }
      .ex-chip {
        font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; padding: 0.18rem 0.45rem;
        background: rgba(50,120,220,0.1); border: 1px solid rgba(80,160,255,0.16); border-radius: 4px;
        color: rgba(160,210,255,0.55); cursor: pointer; user-select: none;
      }
      .ex-chip:hover { background: rgba(60,140,255,0.18); color: #9dd4ff; border-color: rgba(100,180,255,0.3); }

      /* ── CONTROLLI FOTOCAMERA 2D ── */
      .cam-pad {
        display: flex; align-items: center; justify-content: center; margin: 0.5rem auto 0;
        width: 110px; height: 110px; position: relative;
      }
      .cam-btn {
        position: absolute; background: rgba(50,120,220,0.15); border: 1px solid rgba(80,160,255,0.3);
        color: #7dd6ff; font-size: 0.8rem; width: 28px; height: 28px; border-radius: 6px;
        cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none;
      }
      .cam-btn:hover { background: rgba(80,160,255,0.3); color: #fff; }
      .cam-btn:active { transform: scale(0.9); }
      .cam-up    { top: 0; left: 41px; }
      .cam-down  { bottom: 0; left: 41px; }
      .cam-left  { left: 0; top: 41px; }
      .cam-right { right: 0; top: 41px; }
      
      .cam-center {
        position: absolute; top: 38px; left: 38px; width: 34px; height: 34px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(250,216,90,0.1); border: 1px solid rgba(250,216,90,0.3);
        border-radius: 50%; color: #fad85a;
      }

      canvas { display: block; }
    </style>
  </head>
  <body>

    <div id="panel">
      <div class="panel-inner">

        <div class="ph">
          <div class="ph-left">
            <span class="ph-title">f(x) Explorer XR</span>
            <span class="ph-sub">Galli &amp; Santin</span>
          </div>
          <div class="live-dot" title="live update"></div>
        </div>

        <div class="sec-label">Formula</div>
        <div class="fx-row">
          <span class="fx-lbl">f(x)=</span>
          <input id="fxInput" type="text" value="2*x - 1/x" spellcheck="false" autocomplete="off" />
          <button id="applyBtn">PLOT</button>
        </div>
        <div id="fxError"></div>

        <div class="examples">
          <span class="ex-chip" data-fx="A*sin(B*x)">A·sin(B·x)</span>
          <span class="ex-chip" data-fx="A*x^2 + B">A·x²+B</span>
          <span class="ex-chip" data-fx="sin(A*x)/x">sin(A·x)/x</span>
          <span class="ex-chip" data-fx="A*cos(x) + B*sin(2*x)">cos+sin</span>
          <span class="ex-chip" data-fx="2*x - 1/x">2x−1/x</span>
        </div>

        <div class="div"></div>

        <div class="sec-label">Parametri dinamici</div>
        <div class="sr">
          <span class="sn a">A</span>
          <input type="range" id="aSlider" min="-10" max="10" step="0.1" value="1" />
          <span class="sv" id="aValue">1.0</span>
        </div>
        <div class="sr">
          <span class="sn b">B</span>
          <input type="range" id="bSlider" min="-10" max="10" step="0.1" value="1" />
          <span class="sv" id="bValue">1.0</span>
        </div>

        <div class="div"></div>
        
        <div class="sec-label" style="text-align: center;">Muovi Visuale (Camera)</div>
        <div class="cam-pad">
          <button class="cam-btn cam-up" id="camUp">▲</button>
          <button class="cam-btn cam-left" id="camLeft">◀</button>
          <div class="cam-center">📷</div>
          <button class="cam-btn cam-right" id="camRight">▶</button>
          <button class="cam-btn cam-down" id="camDown">▼</button>
        </div>

        <div class="hint">
          <b>A</b> e <b>B</b> cambiano la curva live.<br>
          VR: Interagisci con il pannello fluttuante per regolare i parametri e muovere la fotocamera.
        </div>

      </div>
    </div>

    <script type="module">
      import * as THREE from './vendor/three/build/three.module.js';
      import { VRButton } from './vendor/three/examples/jsm/webxr/VRButton.js';

      /* ══ RENDERER ══════════════════════════════════════════ */
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local');
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      /* ══ SCENE ═════════════════════════════════════════════ */
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x04080f);

      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
      camera.position.set(0, 1.8, 4);

      scene.add(new THREE.HemisphereLight(0xaaccff, 0x101828, 0.85));
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.75);
      dirLight.position.set(5, 7, 5);
      scene.add(dirLight);

      /* floor & grid */
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(10, 10),
        new THREE.MeshStandardMaterial({ color: 0x060e1e, roughness: 0.97, metalness: 0.0 })
      );
      floor.rotation.x = -Math.PI / 2;
      scene.add(floor);

      const grid = new THREE.GridHelper(8, 20, 0x162a50, 0x0c1a34);
      grid.position.y = 0.001;
      scene.add(grid);

      /* ══ STATE ═════════════════════════════════════════════ */
      let fxCurve = null;
      let paramA  = 1;
      let paramB  = 1;
      let fxExpr  = '2*x - 1/x';

      const axesGroup = new THREE.Group();
      axesGroup.position.set(0, 1.2, -0.4);
      axesGroup.scale.setScalar(0.7);
      scene.add(axesGroup);

      createAxes();
      fxCurve = createFxCurve();

      /* ══ VR INTERACTIVE GUI PANEL (Canvas inside VR) ══════ */
      let vrUiMesh;
      const vrUiCanvas = document.createElement('canvas');
      vrUiCanvas.width = 512;
      vrUiCanvas.height = 512;
      const vrUiCtx = vrUiCanvas.getContext('2d');
      const vrUiTexture = new THREE.CanvasTexture(vrUiCanvas);

      // Hitboxes per l'interazione all'interno del menu VR
      const hitBoxes = {
        sliderA:  { x: 50, y: 130, w: 412, h: 40, min: -10, max: 10, type: 'slider', key: 'A' },
        sliderB:  { x: 50, y: 230, w: 412, h: 40, min: -10, max: 10, type: 'slider', key: 'B' },
        btnUp:    { x: 236, y: 340, w: 40, h: 35, type: 'btn', dir: 'up' },
        btnDown:  { x: 236, y: 440, w: 40, h: 35, type: 'btn', dir: 'down' },
        btnLeft:  { x: 186, y: 390, w: 40, h: 35, type: 'btn', dir: 'left' },
        btnRight: { x: 286, y: 390, w: 40, h: 35, type: 'btn', dir: 'right' }
      };

      function drawVrUi() {
        // Sfondo menu VR
        vrUiCtx.fillStyle = 'rgba(5, 11, 26, 0.95)';
        vrUiCtx.fillRect(0, 0, 512, 512);
        
        // Bordo
        vrUiCtx.strokeStyle = 'rgba(80, 180, 255, 0.4)';
        vrUiCtx.lineWidth = 4;
        vrUiCtx.strokeRect(2, 2, 508, 508);

        // Titolo
        vrUiCtx.fillStyle = '#7dd6ff';
        vrUiCtx.font = 'bold 24px sans-serif';
        vrUiCtx.fillText('PARAMETRI & CAMERA (VR)', 30, 50);

        // Disegno Slider A
        vrUiCtx.fillStyle = '#5ae4ff';
        vrUiCtx.font = '20px monospace';
        vrUiCtx.fillText(`Parametro A: ${paramA.toFixed(1)}`, 50, 115);
        drawCanvasSlider(hitBoxes.sliderA, paramA);

        // Disegno Slider B
        vrUiCtx.fillStyle = '#ff7aac';
        vrUiCtx.fillText(`Parametro B: ${paramB.toFixed(1)}`, 50, 215);
        drawCanvasSlider(hitBoxes.sliderB, paramB);

        // Area Controllo Fotocamera
        vrUiCtx.fillStyle = '#c8dff8';
        vrUiCtx.font = '16px sans-serif';
        vrUiCtx.fillText('CONTROLLO CAMERA X/Y', 30, 320);

        // Disegno bottoni direzionali camera
        drawCanvasBtn(hitBoxes.btnUp, '▲');
        drawCanvasBtn(hitBoxes.btnDown, '▼');
        drawCanvasBtn(hitBoxes.btnLeft, '◀');
        drawCanvasBtn(hitBoxes.btnRight, '▶');
        
        // Icona Fotocamera centrale
        vrUiCtx.fillStyle = '#fad85a';
        vrUiCtx.font = '24px sans-serif';
        vrUiCtx.fillText('📷', 242, 417);

        vrUiTexture.needsUpdate = true;
      }

      function drawCanvasSlider(box, val) {
        vrUiCtx.fillStyle = 'rgba(30,70,140,0.6)';
        vrUiCtx.fillRect(box.x, box.y + 18, box.w, 6);
        
        const pct = (val - box.min) / (box.max - box.min);
        vrUiCtx.fillStyle = '#7dd6ff';
        vrUiCtx.fillRect(box.x, box.y + 18, box.w * pct, 6);

        // Indicatore sferico (Thumb)
        vrUiCtx.fillStyle = '#ffffff';
        vrUiCtx.beginPath();
        vrUiCtx.arc(box.x + (box.w * pct), box.y + 21, 10, 0, Math.PI * 2);
        vrUiCtx.fill();
      }

      function drawCanvasBtn(box, text) {
        vrUiCtx.fillStyle = 'rgba(80, 160, 255, 0.15)';
        vrUiCtx.fillRect(box.x, box.y, box.w, box.h);
        vrUiCtx.strokeStyle = 'rgba(80, 160, 255, 0.5)';
        vrUiCtx.lineWidth = 2;
        vrUiCtx.strokeRect(box.x, box.y, box.w, box.h);
        
        vrUiCtx.fillStyle = '#7dd6ff';
        vrUiCtx.font = '20px sans-serif';
        vrUiCtx.fillText(text, box.x + 10, box.y + 26);
      }

      // Creazione geometrica del Pannello Menu 3D nello spazio VR
      const vrUiGeo = new THREE.PlaneGeometry(1.2, 1.2);
      const vrUiMat = new THREE.MeshBasicMaterial({ map: vrUiTexture, side: THREE.DoubleSide, transparent: true });
      vrUiMesh = new THREE.Mesh(vrUiGeo, vrUiMat);
      vrUiMesh.position.set(-1.1, 1.3, -0.6);
      vrUiMesh.rotation.y = 0.4;
      scene.add(vrUiMesh);
      drawVrUi();

      /* ══ DOM CONTROLS SYNC (2D & VR) ═══════════════════════ */
      const aSlider = document.getElementById('aSlider');
      const aValue  = document.getElementById('aValue');
      const bSlider = document.getElementById('bSlider');
      const bValue  = document.getElementById('bValue');

      function syncSliderBg(el) {
        const min = parseFloat(el.min), max = parseFloat(el.max), val = parseFloat(el.value);
        const pct = ((val - min) / (max - min) * 100).toFixed(1) + '%';
        el.style.setProperty('--pct', pct);
      }
      [aSlider, bSlider].forEach(s => syncSliderBg(s));

      function updateAllViews() {
        aValue.textContent = paramA.toFixed(1);
        aSlider.value = paramA;
        bValue.textContent = paramB.toFixed(1);
        bSlider.value = paramB;
        [aSlider, bSlider].forEach(s => syncSliderBg(s));
        updateFxCurve();
        drawVrUi();
      }

      aSlider.addEventListener('input', e => { paramA = parseFloat(e.target.value); updateAllViews(); });
      bSlider.addEventListener('input', e => { paramB = parseFloat(e.target.value); updateAllViews(); });

      /* Movimenti camera da schermo desktop/mobile */
      const CAM_SPEED = 0.1;
      document.getElementById('camUp').addEventListener('click', () => { camera.position.y += CAM_SPEED; });
      document.getElementById('camDown').addEventListener('click', () => { camera.position.y -= CAM_SPEED; });
      document.getElementById('camLeft').addEventListener('click', () => { camera.position.x -= CAM_SPEED; });
      document.getElementById('camRight').addEventListener('click', () => { camera.position.x += CAM_SPEED; });

      document.getElementById('applyBtn').addEventListener('click', applyFx);
      document.getElementById('fxInput').addEventListener('keydown', e => { if (e.key === 'Enter') applyFx(); });

      document.querySelectorAll('.ex-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.getElementById('fxInput').value = chip.dataset.fx;
          applyFx();
        });
      });

      window.addEventListener('resize', onWindowResize);
      renderer.setAnimationLoop(render);

      /* ══ f(x) PARSER & COMPILE ═════════════════════════════ */
      function buildEval(expr) {
        const e = expr
          .replace(/\^/g,      '**')
          .replace(/\bsin\b/g,  'Math.sin')
          .replace(/\bcos\b/g,  'Math.cos')
          .replace(/\btan\b/g,  'Math.tan')
          .replace(/\bsqrt\b/g, 'Math.sqrt')
          .replace(/\babs\b/g,  'Math.abs')
          .replace(/\bexp\b/g,  'Math.exp')
          .replace(/\bprint\b/g,'Math.log')
          .replace(/\bpi\b/gi,  'Math.PI')
          .replace(/\be\b/g,    'Math.E');
        return new Function('x', 'A', 'B', `"use strict"; return (${e});`);
      }

      function applyFx() {
        const raw = document.getElementById('fxInput').value.trim();
        const errEl = document.getElementById('fxError');
        if (!raw) return;
        try {
          buildEval(raw)(1, paramA, paramB);
          errEl.textContent = '';
          fxExpr = raw;
          updateFxCurve();
        } catch (_) {
          errEl.textContent = '\u26a0 espressione non valida';
        }
      }

      function updateFxCurve() {
        if (fxCurve) { axesGroup.remove(fxCurve); fxCurve = null; }
        fxCurve = createFxCurve();
      }

      function createFxCurve() {
        let fn;
        try { fn = buildEval(fxExpr); } catch (_) { return null; }

        const segments = [];
        let seg = [];

        const start = -Math.PI * 4;
        const end   =  Math.PI * 4;
        const step  = 0.05;
        const SCALE_X = 0.3;
        const SCALE_Y = 0.55;
        const CLAMP   = 5.0;

        for (let t = start; t <= end + step * 0.5; t += step) {
          const x = t;
          let y;
          try { y = fn(x, paramA, paramB); } catch (_) { y = NaN; }

          if (!isFinite(y) || Math.abs(y * SCALE_Y) > CLAMP) {
            if (seg.length > 1) segments.push(seg);
            seg = [];
          } else {
            seg.push(new THREE.Vector3(x * SCALE_X, y * SCALE_Y, 0));
          }
        }
        if (seg.length > 1) segments.push(seg);

        const group = new THREE.Group();
        const mat   = new THREE.LineBasicMaterial({ color: 0xffdd55, linewidth: 2 });
        segments.forEach(pts => {
          const geo   = new THREE.BufferGeometry().setFromPoints(pts);
          group.add(new THREE.Line(geo, mat));
        });
        group.position.y = 0.01;
        axesGroup.add(group);
        return group;
      }

      /* ══ AXES GENERATOR ════════════════════════════════════ */
      function createAxes() {
        const length    = 3.0;
        const thickness = 0.025;

        const mX = new THREE.MeshStandardMaterial({ color: 0x5ae4ff, roughness:0.3, metalness:0.3, emissive:0x1a5070, emissiveIntensity:0.4 });
        const mY = new THREE.MeshStandardMaterial({ color: 0x7affa0, roughness:0.3, metalness:0.3, emissive:0x105030, emissiveIntensity:0.4 });
        const mZ = new THREE.MeshStandardMaterial({ color: 0xff7aac, roughness:0.3, metalness:0.3, emissive:0x501030, emissiveIntensity:0.4 });

        const xCyl = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), mX);
        xCyl.rotation.z = -Math.PI / 2; xCyl.position.x = length / 2;
        axesGroup.add(xCyl);

        const yCyl = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), mY);
        yCyl.position.y = length / 2;
        axesGroup.add(yCyl);

        const zCyl = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), mZ);
        zCyl.rotation.x = Math.PI / 2; zCyl.position.z = length / 2;
        axesGroup.add(zCyl);

        const cone = new THREE.ConeGeometry(0.07, 0.22, 16);
        const xArr = new THREE.Mesh(cone, mX); xArr.rotation.z = -Math.PI/2; xArr.position.set(length, 0, 0);
        const yArr = new THREE.Mesh(cone, mY); yArr.position.set(0, length, 0);
        const zArr = new THREE.Mesh(cone, mZ); zArr.rotation.x =  Math.PI/2; zArr.position.set(0, 0, length);
        axesGroup.add(xArr, yArr, zArr);

        for (let i = -4; i <= 4; i++) {
          if (i === 0) continue;
          const tick = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.1, 0.015), new THREE.MeshStandardMaterial({ color: 0x3a7088, roughness: 0.6 }));
          tick.position.set(i * 0.3 * 3.14 / 4, 0, 0);
          axesGroup.add(tick);
        }

        axesGroup.add(createLabel('X', length + 0.2,  0,           0,          '#7ae4ff'));
        axesGroup.add(createLabel('Y', 0,             length + 0.2, 0,          '#7affaa'));
        axesGroup.add(createLabel('Z', 0,             0,            length+0.2, '#ff9abc'));
      }

      function createLabel(text, x, y, z, color) {
        const cv  = document.createElement('canvas');
        cv.width  = 128; cv.height = 64;
        const ctx = cv.getContext('2d');
        ctx.font = 'bold 48px system-ui';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = color || '#c8f4ff';
        ctx.fillText(text, 64, 34);
        const tex = new THREE.CanvasTexture(cv);
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.28, 0.14), new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false }));
        mesh.position.set(x, y, z);
        mesh.lookAt(camera.position);
        return mesh;
      }

      /* ══ VR CONTROLLERS INTERACTION LOGIC ══════════════════ */
      const controllers = [createController(0), createController(1)];
      controllers.forEach(c => scene.add(c));

      const raycaster  = new THREE.Raycaster();
      const tempMatrix = new THREE.Matrix4();
      let selectedController = null;
      let activeBox = null;

      function createController(index) {
        const controller = renderer.xr.getController(index);
        controller.addEventListener('selectstart', onSelectStart);
        controller.addEventListener('selectend',   onSelectEnd);

        const ray = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)]),
          new THREE.LineBasicMaterial({ color: 0x5ae4ff })
        );
        ray.name = 'ray'; ray.scale.z = 6;
        controller.add(ray);
        return controller;
      }

      function onSelectStart(event) {
        const controller = event.target;
        tempMatrix.identity().extractRotation(controller.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

        const intersects = raycaster.intersectObject(vrUiMesh);
        if (intersects.length > 0) {
          const uv = intersects[0].uv;
          // Calcola la posizione esatta in pixel sul canvas VR (512x512)
          const cx = uv.x * 512;
          const cy = (1 - uv.y) * 512;

          for (const key in hitBoxes) {
            const box = hitBoxes[key];
            if (cx >= box.x && cx <= box.x + box.w && cy >= box.y && cy <= box.y + box.h) {
              selectedController = controller;
              activeBox = box;
              handleVrInteraction(cx);
              break;
            }
          }
        }
      }

      function onSelectEnd() { selectedController = null; activeBox = null; }

      function handleVrInteraction(canvasX) {
        if (!activeBox) return;

        if (activeBox.type === 'slider') {
          const pct = Math.max(0, Math.min(1, (canvasX - activeBox.x) / activeBox.w));
          const val = activeBox.min + pct * (activeBox.max - activeBox.min);
          
          if (activeBox.key === 'A') paramA = val;
          if (activeBox.key === 'B') paramB = val;
          updateAllViews();
        } 
        else if (activeBox.type === 'btn') {
          // Spostamento effettivo della camera nello spazio virtuale
          if (activeBox.dir === 'up') camera.position.y += CAM_SPEED;
          if (activeBox.dir === 'down') camera.position.y -= CAM_SPEED;
          if (activeBox.dir === 'left') camera.position.x -= CAM_SPEED;
          if (activeBox.dir === 'right') camera.position.x += CAM_SPEED;
          drawVrUi();
        }
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      /* ══ MAIN LOOP ═════════════════════════════════════════ */
      function render() {
        // Gestione del trascinamento continuo degli slider dentro l'ambiente VR
        if (selectedController && activeBox && activeBox.type === 'slider') {
          tempMatrix.identity().extractRotation(selectedController.matrixWorld);
          raycaster.ray.origin.setFromMatrixPosition(selectedController.matrixWorld);
          raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

          const intersects = raycaster.intersectObject(vrUiMesh);
          if (intersects.length > 0) {
            const cx = intersects[0].uv.x * 512;
            handleVrInteraction(cx);
          }
        }
        renderer.render(scene, camera);
      }
    </script>
  </body>
</html>
